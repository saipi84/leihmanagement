function showSpinner()  { document.getElementById('spinner').classList.add('show'); }
function hideSpinner()  { document.getElementById('spinner').classList.remove('show'); }

function showToast(msg, type = 'info', dur = 4000) {
    const w = document.getElementById('toastWrap');
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.textContent = msg;
    t.onclick = () => dismiss(t);
    w.appendChild(t);
    const id = setTimeout(() => dismiss(t), dur);
    function dismiss(el) { clearTimeout(id); el.classList.add('out'); setTimeout(() => el.remove(), 280); }
}

function toggleTheme() {
    document.body.classList.toggle('dark');
    document.getElementById('btnTheme').textContent = document.body.classList.contains('dark') ? '🌙' : '☀️';
}

// ====================================================================
// DATE / LINK HELPERS
// ====================================================================
function fmtD(s) {
    if (!s) return '--';
    const d = new Date(s);
    if (isNaN(d)) return '--';
    return `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`;
}

function formatDateForInput(s) {
    if (!s) return '';
    if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
    const d = new Date(s);
    if (isNaN(d) || d.getFullYear() < 1900) return '';
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function isPastDate(s) {
    if (!s) return true;
    const [y,m,d] = s.split('-').map(Number);
    const today = new Date(); today.setHours(0,0,0,0);
    return new Date(y, m-1, d) < today;
}

function createFotoLink(od, sb) {
    if (!od || !sb) return '#';
    const d = new Date(od); if (isNaN(d)) return '#';
    const day = String(d.getDate()).padStart(2,'0');
    const month = String(d.getMonth()+1).padStart(2,'0');
    const year = d.getFullYear();
    const folder = `${day}.${month}.${year} ${sb}`;
    return `https://www.pulsnet.ch/sites/ARG-DIBSCM-scmleihsiebe/Leihsiebe/ZSVA/Bilder/${year}/${d.getMonth()+1}/${encodeURIComponent(folder)}`;
}

function createFotoLinkBLIH(aufg, sieb) {
    if (!aufg || !sieb) return '#';
    const year = new Date(aufg).getFullYear();
    return `https://www.pulsnet.ch/sites/ARG-DIBSCM-scmleihsiebe/Leihsiebe/ZSVA/Bilder/B.L.I.H/${year}/${encodeURIComponent(sieb)}`;
}

function openFolder(url) { if (url && url !== '#') window.open(url, '_blank'); }

function openFolderFromInput() {
    const od = document.getElementById('kODat').value;
    const sb = document.getElementById('kSieb').value.trim();
    if (!od || !sb) { showToast('Bitte OPS-Datum und Sieb eingeben.', 'warning'); return; }
    openFolder(createFotoLink(od, sb));
}

function validateSieb(input) {
    if (!input) input = document.getElementById('kSieb');
    const ok = /^[a-zA-ZäöüÄÖÜß0-9\s.,]*$/.test(input.value.trim());
    input.classList.toggle('err', !ok && input.value.trim().length > 0);
    return ok;
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ====================================================================
// PASSWORD MODAL

function showPasswordModal(title) {
    return new Promise((res, rej) => {
        const modal = document.getElementById('passwordModal');
        document.getElementById('modalTitle').textContent = title;
        const input = document.getElementById('passwordInput');
        input.value = '';
        modal.classList.add('open');
        setTimeout(() => input.focus(), 100);
        const ok = () => { modal.classList.remove('open'); cleanup(); res(input.value); };
        const no = () => { modal.classList.remove('open'); cleanup(); rej('Abgebrochen'); };
        const kp = e => { if (e.key==='Enter') ok(); if (e.key==='Escape') no(); };
        document.getElementById('modalConfirm').onclick = ok;
        document.getElementById('modalCancel').onclick = no;
        input.addEventListener('keydown', kp);
        function cleanup() {
            document.getElementById('modalConfirm').onclick = null;
            document.getElementById('modalCancel').onclick = null;
            input.removeEventListener('keydown', kp);
        }
    });
}

// ====================================================================
function addHistoryEntry(id, field, oldVal, newVal) {
    if (!id) return;
    if (!historyData[id]) historyData[id] = [];
    historyData[id].push({
        timestamp: new Date().toLocaleString('de-CH'),
        user: isSchichtleiter ? 'Schichtleiter' : (currentMode === 'admin' ? 'ZSVA' : 'Kunde'),
        field, oldValue: oldVal, newValue: newVal
    });
    if (historyData[id].length > 50) historyData[id].shift();
}

function showHistoryModal(id) {
    const entries = historyData[id] || [];
    document.getElementById('historyModalTitle').textContent = `Änderungen – #${id}`;
    const c = document.getElementById('historyModalContent');
    if (!entries.length) { c.innerHTML = '<p style="color:var(--text-light);text-align:center;padding:20px 0;">Keine Einträge.</p>'; }
    else {
        c.innerHTML = entries.slice().reverse().map(e =>
            `<div class="hist-entry">
                <div class="hist-time">${esc(e.timestamp)} · ${esc(e.user)}</div>
                <div>${esc(e.field)}: <span class="hist-old">${esc(e.oldValue||'—')}</span><span class="hist-arrow">→</span><span class="hist-new">${esc(e.newValue||'—')}</span></div>
            </div>`
        ).join('');
    }
    document.getElementById('historyModal').classList.add('open');
}

function closeHistoryModal() { document.getElementById('historyModal').classList.remove('open'); }

async function loadFromSP() {
    showSpinner();
    try {
        if (!listItemTypeFullName) await getListItemType();
        const r = await fetch(_spPageContextInfo.webAbsoluteUrl + `/_api/web/lists/getbytitle('${listTitle}')/items?$top=5000&$select=*`, { headers: { 'Accept': 'application/json;odata=verbose' }, credentials: 'include' });
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const j = await r.json();
        if (j.d && j.d.results) {
            data = j.d.results.map(i => ({
                id: i.Id,
                ld: i.LDat ? formatDateForInput(i.LDat) : '',
                od: i.ODat ? formatDateForInput(i.ODat) : '',
                sp: i.Spital || '', lf: i.Lieferant || '', sb: i.Title || '',
                ma: i.MA || '', note: (i.Notiz||'').replace(/<[^>]*>/g,'').trim(),
                eingang: i.Eingang || '', visum: i.Visum || '',
                offenVisum: i.OffenVisum || '', offen: i.Offen || 'nein',
                krit: i.Kritisch || 'nein', min: i.Minuten || 0,
                versand: i.Versand || '',
                anzahl: (i.Anzahl !== undefined && i.Anzahl !== null) ? i.Anzahl.toString().replace('.',',') : ''
            }));
            data.sort((a,b) => new Date(a.ld) - new Date(b.ld));
            j.d.results.forEach(i => {
                try { historyData[i.Id] = i.History ? JSON.parse(i.History) : []; }
                catch { historyData[i.Id] = []; }
            });
        } else { data = []; }
        render();
    } catch(e) { console.error(e); showToast('Fehler beim Laden.', 'error'); data = []; render(); }
    finally { hideSpinner(); }
}

async function save(field, value, id) {
    try {
        const digest = document.getElementById('__REQUESTDIGEST');
        if (!digest?.value || !listItemTypeFullName) return;
        const fieldMap = { ld:'LDat', od:'ODat', sp:'Spital', lf:'Lieferant', sb:'Title', ma:'MA', note:'Notiz', eingang:'Eingang', visum:'Visum', offenVisum:'OffenVisum', offen:'Offen', krit:'Kritisch', min:'Minuten', versand:'Versand', anzahl:'Anzahl' };
        const payload = { '__metadata': { 'type': listItemTypeFullName } };
        if (fieldMap[field]) {
            if (field === 'min') payload[fieldMap[field]] = parseInt(value)||0;
            else if (field === 'anzahl') { let n = parseFloat(String(value).replace(',','.')); payload[fieldMap[field]] = isNaN(n)?0:n; }
            else payload[fieldMap[field]] = value;
        }
        payload.History = JSON.stringify(historyData[id]||[]);
        const r = await fetch(_spPageContextInfo.webAbsoluteUrl + `/_api/web/lists/getbytitle('${listTitle}')/items(${id})`, {
            method: 'POST', credentials: 'include',
            headers: { 'Accept':'application/json;odata=verbose','Content-Type':'application/json;odata=verbose','X-RequestDigest':digest.value,'X-HTTP-Method':'MERGE','IF-MATCH':'*' },
            body: JSON.stringify(payload)
        });
        if (!r.ok) { showToast('Fehler beim Speichern!', 'error'); }
    } catch(e) { showToast('Netzwerkfehler.', 'error'); }
}

async function saveBLIH(field, value, id) {
    try {
        const digest = document.getElementById('__REQUESTDIGEST');
        if (!digest?.value || !listBLIHItemTypeFullName) return;
        const fieldMap = { aufgenommen:'Aufgenommen_x0020_am', spital:'Spital', lieferant:'Lieferant', sieb:'Title', kritisch:'Kritisch', ste:'STF', abgemeldetAm:'Abgemeldet_x0020_am', abgemeldetVon:'AbgemeldetVon', zsvaAusgang:'ZSVAAusgang', bemerkung:'Bemerkung' };
        const payload = { '__metadata': { 'type': listBLIHItemTypeFullName } };
        if (fieldMap[field]) payload[fieldMap[field]] = value;
        payload.History = JSON.stringify(historyData[`BLIH_${id}`]||[]);
        const r = await fetch(_spPageContextInfo.webAbsoluteUrl + `/_api/web/lists/getbytitle('${listBLIHTitle}')/items(${id})`, {
            method: 'POST', credentials: 'include',
            headers: { 'Accept':'application/json;odata=verbose','Content-Type':'application/json;odata=verbose','X-RequestDigest':digest.value,'X-HTTP-Method':'MERGE','IF-MATCH':'*' },
            body: JSON.stringify(payload)
        });
        if (!r.ok) showToast('Fehler beim Speichern BLIH!', 'error');
    } catch(e) { showToast('Netzwerkfehler.', 'error'); }
}

function saveWithHistory(field, value, id, oldValue) {
    if (value == oldValue) return;
    const item = data.find(x => x.id == id);
    if (item) { item[field] = value; addHistoryEntry(id, field, oldValue, value); }
    save(field, value, id);
    render();
}

function saveBLIHWithHistory(field, value, id, oldValue) {
    if (value == oldValue) return;
    const item = dataBLIH.find(x => x.id == id);
    if (item) {
        item[field] = value;
        const key = `BLIH_${id}`;
        if (!historyData[key]) historyData[key] = [];
        historyData[key].push({ timestamp: new Date().toLocaleString('de-CH'), user: isSchichtleiter?'Schichtleiter':'ZSVA', field, oldValue, newValue: value });
        if (historyData[key].length > 50) historyData[key].shift();
    }
    saveBLIH(field, value, id);
    renderBLIH();
}

async function add() {
    if (isSubmitting) return;
    const ld   = document.getElementById('kLDat').value;
    const od   = document.getElementById('kODat').value;
    const spit = document.getElementById('kSpit').value;
    const lief = document.getElementById('kLief').value.trim();
    const sb   = document.getElementById('kSieb').value.trim();
    const ma   = document.getElementById('kMa').value.trim();

    let errors = [];
    if (!ld)   errors.push('Liefer Datum');
    if (!od)   errors.push('OPS Datum');
    if (!spit) errors.push('Spital');
    if (!lief) errors.push('Lieferant');
    if (!sb)   errors.push('Sieb Bezeichnung');
    if (!ma)   errors.push('MA OP');
    if (errors.length) { showToast('⚠️ Pflichtfelder fehlen: ' + errors.join(', '), 'error'); return; }
    if (!validateSieb(document.getElementById('kSieb'))) { showToast('⚠️ Ungültige Zeichen im Sieb-Feld!', 'error'); return; }
    if (isPastDate(ld)) { showToast('⚠️ Liefer-Datum liegt in der Vergangenheit!', 'error'); return; }
    if (isPastDate(od)) { showToast('⚠️ OPS-Datum liegt in der Vergangenheit!', 'error'); return; }
    if (new Date(ld) > new Date(od)) { showToast('⚠️ Liefer-Datum nach OPS-Datum!', 'error'); return; }
    const dup = data.find(i => i.od===od && i.ld===ld && i.sb.toLowerCase()===sb.toLowerCase());
    if (dup) { showToast(`⚠️ Duplikat! "${sb}" ist bereits für diesen Termin gemeldet.`, 'error'); return; }

    isSubmitting = true;
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    showSpinner();
    try {
        const digest = document.getElementById('__REQUESTDIGEST');
        if (!listItemTypeFullName) await getListItemType();
        const payload = {
            '__metadata': { 'type': listItemTypeFullName },
            'Title': sb, 'LDat': ld, 'ODat': od, 'Spital': spit, 'Lieferant': lief,
            'MA': ma, 'Notiz': document.getElementById('kNote').value||'',
            'Eingang':'','Visum':'','Minuten':0,'Offen':'nein','OffenVisum':'','Kritisch':'nein','Anzahl':0,'History':'[]'
        };
        const r = await fetch(_spPageContextInfo.webAbsoluteUrl + `/_api/web/lists/getbytitle('${listTitle}')/items`, {
            method: 'POST', credentials: 'include',
            headers: { 'Accept':'application/json;odata=verbose','Content-Type':'application/json;odata=verbose','X-RequestDigest':digest.value },
            body: JSON.stringify(payload)
        });
        if (!r.ok) throw new Error('HTTP '+r.status);
        const res = await r.json();
        const newItem = { id:res.d.Id, ld, od, sp:spit, lf:lief, sb, ma, note:document.getElementById('kNote').value||'', eingang:'', visum:'', offenVisum:'', offen:'nein', krit:'nein', min:0, versand:'', anzahl:'' };
        historyData[newItem.id] = [];
        data.push(newItem);
        data.sort((a,b) => new Date(a.ld)-new Date(b.ld));
        try { await ensureFolderExists(od, sb); } catch(e) { console.warn('Ordner Fehler:', e); }
        ['kLDat','kODat','kSpit','kLief','kSieb','kMa','kNote'].forEach(id => { document.getElementById(id).value=''; });
        showToast(`✅ "${sb}" erfolgreich registriert!`, 'success');
        render();
    } catch(e) { showToast('❌ Fehler beim Speichern.', 'error'); }
    finally { isSubmitting = false; btn.disabled = false; hideSpinner(); }
}

async function addBLIH() {

    const spital = document.getElementById('bSpital').value;

    if (!aufgenommen) errors.push('Aufgenommen am');
    if (!spital) errors.push('Spital');
    if (!lieferant) errors.push('Lieferant');
    if (!sieb) errors.push('Sieb');
    if (errors.length) { showToast('⚠️ Pflichtfelder fehlen: '+errors.join(', '), 'error'); return; }
    const dup = dataBLIH.find(i => i.aufgenommen===aufgenommen && i.sieb.toLowerCase()===sieb.toLowerCase());

        const digest = document.getElementById('__REQUESTDIGEST');

        const ste = document.getElementById('bSTF').value.trim();

        const zsvaAusgang = document.getElementById('bZSVAAusgang').value.trim();
        const bemerkung = document.getElementById('bBemerkung').value.trim();
        const payload = {
            '__metadata':{'type':listBLIHItemTypeFullName},
            'Title':sieb,'Aufgenommen_x0020_am':aufgenommen||null,'Spital':spital,'Lieferant':lieferant,
            'Kritisch':kritisch,'STF':ste,'Abgemeldet_x0020_am':abgemeldetAm||null,
            'AbgemeldetVon':abgemeldetVon,'ZSVAAusgang':zsvaAusgang,'Bemerkung':bemerkung,'History':'[]'
        };
        const r = await fetch(_spPageContextInfo.webAbsoluteUrl + `/_api/web/lists/getbytitle('${listBLIHTitle}')/items`, {

            body:JSON.stringify(payload)
        });
        if (!r.ok) throw new Error('HTTP '+r.status);
        const res = await r.json();
        dataBLIH.push({ id:res.d.Id, aufgenommen, spital, lieferant, sieb, kritisch, ste, abgemeldetAm, abgemeldetVon, zsvaAusgang, bemerkung });
        historyData[`BLIH_${res.d.Id}`] = [];
        try { await ensureBLIHFolderExists(aufgenommen, sieb); } catch(e) {}
        ['bAufgenommen','bSpital','bLieferant','bSieb','bKritisch','bSTF','bAbgemeldetAm','bAbgemeldetVon','bZSVAAusgang','bBemerkung'].forEach(id => {

        renderBLIH();
    } catch(e) { showToast('❌ Fehler beim Speichern.','error'); }
    finally { hideSpinner(); }
}

// ====================================================================
async function del(id) {
    if (!isSchichtleiter) { showToast('❌ Nur Schichtleiter!', 'error'); return; }
    if (!confirm('Eintrag wirklich löschen?')) return;
    showSpinner();
    try {
        const digest = document.getElementById('__REQUESTDIGEST');
        await fetch(_spPageContextInfo.webAbsoluteUrl + `/_api/web/lists/getbytitle('${listTitle}')/items(${id})`, {
            method:'POST',credentials:'include',
            headers:{'Accept':'application/json;odata=verbose','Content-Type':'application/json;odata=verbose','X-RequestDigest':digest.value,'X-HTTP-Method':'DELETE','IF-MATCH':'*'}
        });
        data = data.filter(x => x.id !== id);
        delete historyData[id];
        showToast('✅ Gelöscht!', 'success');
    } catch(e) { data = data.filter(x => x.id !== id); showToast('Lokal gelöscht.', 'warning'); }
    finally { hideSpinner(); render(); }
}

async function delBLIH(id) {
    if (!isSchichtleiter) { showToast('❌ Nur Schichtleiter!', 'error'); return; }
    if (!confirm('BLIH-Eintrag löschen?')) return;
    showSpinner();
    try {
        const digest = document.getElementById('__REQUESTDIGEST');
        await fetch(_spPageContextInfo.webAbsoluteUrl + `/_api/web/lists/getbytitle('${listBLIHTitle}')/items(${id})`, {
            method:'POST',credentials:'include',
            headers:{'Accept':'application/json;odata=verbose','Content-Type':'application/json;odata=verbose','X-RequestDigest':digest.value,'X-HTTP-Method':'DELETE','IF-MATCH':'*'}
        });
        dataBLIH = dataBLIH.filter(x => x.id !== id);
        delete historyData[`BLIH_${id}`];
        showToast('✅ BLIH gelöscht!', 'success');
    } catch(e) { dataBLIH = dataBLIH.filter(x => x.id !== id); showToast('Lokal gelöscht.', 'warning'); }
    finally { hideSpinner(); renderBLIH(); }
}

// ====================================================================
// FOLDER CREATION
// ====================================================================
async function createFolder(relativePath) {
    const digest = document.getElementById('__REQUESTDIGEST');
    if (!digest?.value) return;
    const r = await fetch(_spPageContextInfo.webAbsoluteUrl + '/_api/web/folders', {
        method:'POST',headers:{'Accept':'application/json;odata=verbose','Content-Type':'application/json;odata=verbose','X-RequestDigest':digest.value},
        body:JSON.stringify({'__metadata':{'type':'SP.Folder'},'ServerRelativeUrl':relativePath}),credentials:'include'
    });
    return r.ok || r.status === 409;
}

async function ensureFolderExists(od, sb) {
    if (!od||!sb) return;
    const d = new Date(od); if (isNaN(d)) return;
    const year=d.getFullYear(), month=d.getMonth()+1, day=String(d.getDate()).padStart(2,'0'), monthP=String(month).padStart(2,'0');
    const folder=`${day}.${monthP}.${year} ${sb}`;
    const lib='/sites/ARG-DIBSCM-scmleihsiebe/Leihsiebe/ZSVA/Bilder';
    await createFolder(`${lib}/${year}`);
    await createFolder(`${lib}/${year}/${month}`);
    await createFolder(`${lib}/${year}/${month}/${encodeURIComponent(folder)}`);
}

async function ensureBLIHFolderExists(aufg, sieb) {
    if (!aufg||!sieb) return;
    const year = new Date(aufg).getFullYear();
    const lib='/sites/ARG-DIBSCM-scmleihsiebe/Leihsiebe/ZSVA/Bilder';
    await createFolder(`${lib}/B.L.I.H`);
    await createFolder(`${lib}/B.L.I.H/${year}`);
    await createFolder(`${lib}/B.L.I.H/${year}/${encodeURIComponent(sieb)}`);
}

function setEingangNow(id) {
    if (!isSchichtleiter) { showToast('❌ Nur Schichtleiter!', 'error'); return; }
    const now = new Date();
    const val = `${String(now.getDate()).padStart(2,'0')}.${String(now.getMonth()+1).padStart(2,'0')}. ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    const item = data.find(x => x.id == id);
    if (item) { addHistoryEntry(id, 'Eingang', item.eingang, val); item.eingang = val; save('eingang', val, id); }
    render();
}

function getCardStatus(d) {
    if (d.visum)   return { label:'Fertig', cls:'status-done', cardCls:'done' };
    if (d.eingang) return { label:'In Bearbeitung', cls:'status-offen', cardCls:'offen' };
    const now = new Date(); now.setHours(0,0,0,0);
    const late = d.eingang==='' && d.ld <= now.toISOString().split('T')[0] && new Date().getHours()>=10;
    return late
        ? { label:'FEHLT!', cls:'status-offen', cardCls:'late' }
        : { label:'Angemeldet', cls:'status-waiting', cardCls:'' };
}

function toggleCard(cardId) {
    const card = document.getElementById(cardId);
    if (!card) return;
    card.classList.toggle('expanded');
}

// ====================================================================
// RENDER: MAIN
// ====================================================================
function render() {
    const now = new Date();
    const tenDaysAgo = new Date(); tenDaysAgo.setDate(now.getDate()-10);

    if (currentMode === 'kunden' || currentMode === 'admin') {
        const filtered = data.filter(d => currentFilter === 'Alle' || d.sp === currentFilter);
        const active  = filtered.filter(d => new Date(d.od) >= tenDaysAgo);
        const archiv  = filtered.filter(d => new Date(d.od) < tenDaysAgo);

        if (currentMode === 'kunden') {
            const listEl = document.getElementById('leihList');
            if (!listEl) return;
            listEl.innerHTML = active.length
                ? `<div class="section-label">Aktive Leihsiebe <span class="count-badge">${active.length}</span></div>` + active.map(d => renderLeihCard(d, false)).join('')
                : '<div class="empty-state"><div class="empty-icon">📭</div><p>Keine aktiven Leihsiebe</p></div>';
            document.getElementById('archivList').innerHTML = archiv.map(d => renderLeihCard(d, true)).join('');
            document.getElementById('archivCount').textContent = archiv.length;
        }

        if (currentMode === 'admin') {
            const adminEl = document.getElementById('adminList');
            if (!adminEl) return;
            adminEl.innerHTML = active.length
                ? `<div class="section-label">Aktive Leihsiebe <span class="count-badge">${active.length}</span></div>` + active.map(d => renderLeihCard(d, false)).join('')
                : '<div class="empty-state"><div class="empty-icon">📭</div><p>Keine aktiven Leihsiebe</p></div>';
            document.getElementById('adminArchivList').innerHTML = archiv.map(d => renderLeihCard(d, true)).join('');
            document.getElementById('adminArchivCount').textContent = archiv.length;
        }
    }
}

// ====================================================================
// ACCESS / NAVIGATION
// ====================================================================
async function getUserGroups() {
    try {
        const r = await fetch(_spPageContextInfo.webAbsoluteUrl + '/_api/web/currentuser/groups?$select=Title', { headers:{'Accept':'application/json;odata=verbose'}, credentials:'include' });
        if (!r.ok) return [];
        const j = await r.json();
        return (j.d && j.d.results) ? j.d.results.map(g => g.Title) : [];
    } catch { return []; }
}

async function checkAccess(type) {
    showSpinner();
    const groups = await getUserGroups();
    hideSpinner();

    const isBesitzer = groups.includes('Besitzer von SCM Leihsiebe');
    const isKunde    = groups.includes('SCM Kunden');
    const isZSVA     = groups.includes('SCM ZSVA');
    const isSchichtl = groups.includes('SCM Schichtleiter');

    if (type === 'K') {
        if (!isKunde && !isSchichtl && !isBesitzer) { showToast("❌ Kein Zugriff! Gruppe 'SCM Kunden' fehlt.", 'error'); return; }
        currentMode = 'kunden'; isSchichtleiter = false;
        enterApp('kunden');
        showToast('✅ Willkommen im Kunden-Portal!', 'success');
        await loadFromSP();
        if (dataBLIH.length === 0) loadBLIHFromSP();
    } else {
        if (!isZSVA && !isSchichtl && !isBesitzer) { showToast("❌ Kein Zugriff! Gruppe 'SCM ZSVA' fehlt.", 'error'); return; }
        currentMode = 'admin';
        isSchichtleiter = isSchichtl || isBesitzer;
        enterApp('admin');
        showToast(isSchichtleiter ? '✅ Schichtleiter angemeldet.' : '✅ ZSVA angemeldet.', 'success');
        await loadFromSP();
        if (dataBLIH.length === 0) loadBLIHFromSP();
    }
}

function enterApp(mode) {
    document.getElementById('homePage').style.display = 'none';
    document.getElementById('topBar').style.display = 'flex';
    document.getElementById('filterBar').style.display = 'block';
    document.getElementById('mainScroll').style.display = 'block';
    document.getElementById('bottomNav').style.display = 'flex';

    document.getElementById('navK').style.display = mode==='kunden' ? 'flex' : 'none';
    document.getElementById('navA').style.display = mode==='admin'  ? 'flex' : 'none';
    document.getElementById('navB').style.display = 'flex';

    document.getElementById('btnSchicht').style.display = mode==='admin' ? 'flex' : 'none';
    document.getElementById('btnMail').style.display = mode==='admin' && isSchichtleiter ? 'flex' : 'none';

    updateTopBarTitle();
    updateSchichtBtn();

    if (mode === 'kunden') showKundenView(false);
    else showAdminView(false);

    if (autoRefreshTimer) clearInterval(autoRefreshTimer);
    autoRefreshTimer = setInterval(loadFromSP, 30000);
}

function updateTopBarTitle() {
    const titles = { kunden: '🏥 Kunden', admin: '🔧 ZSVA Admin' };
    document.getElementById('topBarTitle').textContent = titles[currentMode] || 'ZSVA Leih';
}

function updateSchichtBtn() {
    const btn = document.getElementById('btnSchicht');
    if (isSchichtleiter) {
        btn.textContent = '🔑';
        btn.title = 'Schichtleiter AKTIV – tippen zum Deaktivieren';
    } else {
        btn.textContent = '👤';
        btn.title = 'Schichtleiter aktivieren';
    }
}

async function toggleSchichtleiter() {
    if (currentMode !== 'admin') return;
    if (isSchichtleiter) {
        isSchichtleiter = false;
        showToast('Schichtleiter-Modus deaktiviert.', 'info');
    } else {
        showSpinner();
        const groups = await getUserGroups();
        hideSpinner();
        if (groups.includes('SCM Schichtleiter') || groups.includes('Besitzer von SCM Leihsiebe')) {
            isSchichtleiter = true;
            showToast('✅ Schichtleiter aktiviert!', 'success');
        } else {
            showToast("❌ Kein Zugriff! Gruppe 'SCM Schichtleiter' fehlt.", 'error');
        }
    }
    updateSchichtBtn();
    document.getElementById('btnMail').style.display = isSchichtleiter ? 'flex' : 'none';
    render();
    renderBLIH();
}

function showKundenView(doRender = true) {
    setActiveNav('navK');
    document.getElementById('viewK').style.display = 'block';
    document.getElementById('viewA').style.display = 'none';
    document.getElementById('viewBLIH').style.display = 'none';
    document.getElementById('filterBar').style.display = 'block';
    if (doRender) render();
}

function showAdminView(doRender = true) {
    setActiveNav('navA');
    document.getElementById('viewK').style.display = 'none';
    document.getElementById('viewA').style.display = 'block';
    document.getElementById('viewBLIH').style.display = 'none';
    document.getElementById('filterBar').style.display = 'block';
    if (doRender) render();
}

function showBLIHView() {
    setActiveNav('navB');
    document.getElementById('viewK').style.display = 'none';
    document.getElementById('viewA').style.display = 'none';
    document.getElementById('viewBLIH').style.display = 'block';
    document.getElementById('filterBar').style.display = 'none';
    if (dataBLIH.length === 0) loadBLIHFromSP(); else renderBLIH();
}

function setActiveNav(activeId) {
    ['navK','navA','navB'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.classList.toggle('active', id === activeId);
    });
}

function setFilter(v, btn) {
    currentFilter = v;
    document.querySelectorAll('#filterBar .chip:not(.archive-chip)').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    render();
}

function toggleArchiv(btn) {
    showArchiv = !showArchiv;
    if (btn) btn.classList.toggle('active', showArchiv);
    const archivK = document.getElementById('archivSection');
    const archivA = document.getElementById('adminArchivSection');
    if (archivK) archivK.style.display = showArchiv ? 'block' : 'none';
    if (archivA) archivA.style.display = showArchiv ? 'block' : 'none';
}

function goHome() {
    currentMode = null; isSchichtleiter = false; showArchiv = false;
    if (autoRefreshTimer) { clearInterval(autoRefreshTimer); autoRefreshTimer = null; }
    document.getElementById('homePage').style.display = 'flex';
    document.getElementById('topBar').style.display = 'none';
    document.getElementById('filterBar').style.display = 'none';
    document.getElementById('mainScroll').style.display = 'none';
    document.getElementById('bottomNav').style.display = 'none';
}

// ====================================================================
// EMAIL
// ====================================================================
async function sendSpEmail(to, cc, subject, body) {
    const digest = document.getElementById('__REQUESTDIGEST');
    if (!digest?.value) throw new Error('FormDigest fehlt!');
    const r = await fetch(_spPageContextInfo.webAbsoluteUrl + '/_api/SP.Utilities.Utility.SendEmail', {
        method:'POST', credentials:'include',
        headers:{'Accept':'application/json;odata=verbose','Content-Type':'application/json;odata=verbose','X-RequestDigest':digest.value},
        body:JSON.stringify({'properties':{'__metadata':{'type':'SP.Utilities.EmailProperties'},'From':emailConfig.from,'To':{'results':to},'CC':{'results':cc},'BCC':{'results':[emailConfig.from]},'Subject':subject,'Body':body}})
    });
    if (!r.ok) throw new Error('HTTP '+r.status);
}

async function sendMail() {
    if (!isSchichtleiter) { showToast('❌ Nur Schichtleiter!', 'error'); return; }
    const missing = data.filter(d => !d.eingang || !d.eingang.trim());
    if (!missing.length) { showToast('✅ Keine fehlenden Leihsiebe.', 'success'); return; }
    if (!confirm(`📧 ${missing.length} fehlende Leihsiebe gefunden. E-Mails senden?`)) return;
    showSpinner();
    const cc = emailConfig.cc.split(';').map(e=>e.trim()).filter(Boolean);
    let sent = 0, errors = 0;
    for (const item of missing) {
        if (!emailConfig.recipients[item.sp]) continue;
        const to = emailConfig.recipients[item.sp].split(';').map(e=>e.trim()).filter(Boolean);
        try {
            await sendSpEmail(to, cc, `Fehlendes Leihsieb: ${item.sb} - ${fmtD(item.od)}`,
                `<p>Hallo,</p><p>Leihsieb <strong>${item.sb}</strong> (OPS: ${fmtD(item.od)}, Spital: <strong>${item.sp}</strong>) fehlt noch. Bitte prüfen.</p><p>Freundliche Grüsse<br>ZSVA St. Gallen</p>`);
            sent++;
        } catch { errors++; }
    }
    hideSpinner();
    showToast(errors ? `⚠️ ${sent} gesendet, ${errors} Fehler.` : `✅ ${sent} E-Mail(s) gesendet!`, errors?'warning':'success');
}

// INIT
// ====================================================================
document.addEventListener('DOMContentLoaded', () => {
    if (typeof _spPageContextInfo === 'undefined') {
        document.getElementById('homePage').innerHTML = '<div style="color:var(--gold);text-align:center;padding:40px;font-size:16px;">⚠️ Bitte in SharePoint öffnen!</div>';
        return;
    }

    document.body.addEventListener('touchmove', function(e) {
        if (e.target.closest('#mainScroll') || e.target.closest('.modal-sheet')) return;
        e.preventDefault();
    }, { passive: false });

    document.getElementById('passwordModal').addEventListener('click', function(e) {
        if (e.target === this) document.getElementById('modalCancel').click();
    });
    document.getElementById('historyModal').addEventListener('click', function(e) {
        if (e.target === this) closeHistoryModal();
    });

    loadFromSP();
});
